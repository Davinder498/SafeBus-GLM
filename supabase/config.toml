# SafeBus Alberta — Supabase project config
# See: https://supabase.com/docs/guides/local-development/cli/config

project_id = "safebus-alberta"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
refresh_token_rotation_enabled = true
refresh_token_reuse_interval = 10
enable_signup = false
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "1s"

[auth.sms]
enable_signup = false
enable_confirmations = false

# Edge Functions
[functions.ingest-location]
verify_jwt = true

[functions.process-scan]
verify_jwt = true

[functions.dispatch-notification]
verify_jwt = true

[functions.gps-stale-check]
verify_jwt = false  # Invoked by cron schedule

[functions.generate-badge]
verify_jwt = true
